    <script>
        function searchApp() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('app-card');
            for (let i = 0; i < cards.length; i++) {
                cards[i].style.display = cards[i].innerText.toLowerCase().includes(input) ? "block" : "none";
            }
        }
        function installLink(url) {
            document.getElementById('overlay').style.display = 'flex';
            setTimeout(() => { window.location.href = url; document.getElementById('overlay').style.display = 'none'; }, 2500);
        }
        if (window.navigator.standalone === false && /iPhone|iPad|iPod/.test(navigator.userAgent)) {
            document.getElementById('pwa-prompt').style.display = 'block';
        }
    </script>
